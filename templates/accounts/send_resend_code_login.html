<!DOCTYPE html>
<html lang="fa">
<head>
    <meta charset="UTF-8">
    <title>بازیابی رمز و ورود</title>
    <style>
        body {
            font-family: sans-serif;
            direction: rtl;
            background: #f4f4f4;
            padding: 40px;
        }
        .card {
            background: white;
            padding: 25px;
            border-radius: 8px;
            max-width: 380px;
            margin: auto;
            box-shadow: 0 0 10px #ccc;
        }
        input, button {
            width: 100%;
            padding: 10px;
            margin-top: 12px;
            border: 1px solid #bbb;
            border-radius: 6px;
            font-size: 15px;
        }
        button {
            background: #005bd3;
            color: white;
            cursor: pointer;
        }
        button:hover {
            background: #004bb0;
        }
        #code-section { display: none; }
    </style>
</head>
<body>

<div class="card">
    <h3>ورود با ایمیل + کد</h3>

    <!-- بخش وارد کردن ایمیل -->
    <div id="email-section">
        <label>ایمیل خود را وارد کنید</label>
        <input type="email" id="email" placeholder="example@gmail.com" required>
        <button onclick="sendCode()">ارسال کد</button>
    </div>

    <!-- بخش وارد کردن کد، بعد از ارسال کد نمایش داده می‌شود -->
    <div id="code-section">
        <label>کد ارسال شده را وارد کنید</label>
        <input type="text" id="code" maxlength="6" placeholder="123456" required>
        <button onclick="verifyCode()">ورود</button>
    </div>

    <p id="msg" style="color: green; margin-top: 10px;"></p>
</div>

<script>
    function sendCode() {
        const email = document.getElementById("email").value;

        fetch("/account/api/v1/send/reset/password/", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({email: email})
        })
        .then(res => res.json())
        .then(data => {
            document.getElementById("msg").textContent = data.message;
            document.getElementById("email-section").style.display = "none";
            document.getElementById("code-section").style.display = "block";
        });
    }

    function verifyCode() {
        const code = document.getElementById("code").value;

        fetch("/account/api/v1/confirm/rest/password/", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            credentials: "include"   // بسیار مهم — این باعث ارسال و دریافت کوکی میشود
            ,
            body: JSON.stringify({code: code})
        })
        .then(res => res.json())
        .then(data => {
            if (data.redirect_url) {
                window.location.href = data.redirect_url; // ریدایرکت اتوماتیک
            } else {
                document.getElementById("msg").textContent = "کد صحیح است اما ریدایرکت تنظیم نشده";
            }
        });
    }
</script>

</body>
</html>
