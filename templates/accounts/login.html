<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { font-family: "IRANSans", Arial, sans-serif; background: #fff; }
        .form-container {
            max-width: 500px;
            margin: 80px auto;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0px 6px 20px rgba(0,0,0,0.1);
            background: #f8f9fa;
        }
        .form-control { padding: 15px; font-size: 16px; border-radius: 10px; margin-bottom: 20px; }
        .btn-primary { padding: 12px; font-size: 16px; border-radius: 10px; width: 100%; }
        #result { margin-top: 15px; text-align: center; }
    </style>
</head>
<body>

<div class="form-container">
    <h2 class="text-center mb-4">Login</h2>
    <form id="loginForm">
        {% csrf_token %}
        <input class="form-control" type="email" name="email" placeholder="Email" required>
        <input class="form-control" type="password" name="password" placeholder="Password" required>
        <button type="submit" class="btn btn-primary">Login</button>
    </form>
    <div id="result"></div>
</div>

<div class="container mt-5">
    <p>Welcome, <span id="usernameDisplay">Guest</span></p>
</div>

<script>
function getCookie(name) {
    let cookieValue = null;
    if (document.cookie && document.cookie !== '') {
        const cookies = document.cookie.split(';');
        for (let cookie of cookies) {
            cookie = cookie.trim();
            if (cookie.startsWith(name + '=')) {
                cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                break;
            }
        }
    }
    return cookieValue;
}

const csrftoken = getCookie('csrftoken');

// گرفتن اطلاعات کاربر بعد از لاگین
async function getUserInfo() {
    const token = localStorage.getItem("token");
    if (!token) return;

    let response = await fetch("{% url 'account:api/v1:profile' %}", {
        headers: { "Authorization": `Token ${token}` }
    });

    if (response.ok) {
        const data = await response.json();
        document.getElementById("usernameDisplay").textContent = data.username;
    }
}

getUserInfo();

// هندل کردن فرم لاگین
document.getElementById("loginForm").addEventListener("submit", async function(e) {
    e.preventDefault();

    const formData = {
        email: this.email.value,
        password: this.password.value
    };

    try {
        let response = await fetch("{% url 'account:api/v1:login' %}", {
            method: "POST",
            headers: {
                "Content-Type": "application/json",
                "X-CSRFToken": csrftoken
            },
            body: JSON.stringify(formData)
        });

        const data = await response.json();

        if (response.ok) {
            localStorage.setItem("token", data.auth_token);

            document.getElementById("result").innerHTML =
                `<p class="text-success">Login successful! Redirecting...</p>`;

            
            const redirectUrl = data.redirect_url || "{% url 'shop-list' %}";
            setTimeout(() => window.location.href = redirectUrl, 1500);

        } else {
            document.getElementById("result").innerHTML =
                `<p class="text-danger">Login failed: ${JSON.stringify(data)}</p>`;
        }
    } catch (err) {
        document.getElementById("result").innerHTML =
            `<p class="text-danger">Something went wrong</p>`;
    }
});
</script>

</body>
</html>
