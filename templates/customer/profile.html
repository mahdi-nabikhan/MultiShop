<!-- 🔹 Fetch User from JWT Cookie and Fill Profile -->
<script>
document.addEventListener("DOMContentLoaded", async () => {
  const authHeader = document.getElementById("authHeader");

  const createButton = (text, classes, href="#") => {
    const btn = document.createElement("a");
    btn.innerText = text;
    btn.className = classes;
    btn.href = href;
    return btn;
  };

  try {
    const res = await fetch("{% url 'account:api/v1:profile' %}", {
      method: "GET",
      credentials: "include"
    });

    if (!res.ok) throw new Error("Not authenticated");

    const data = await res.json();

    // Header username + logout button
    const userSpan = document.createElement("span");
    userSpan.innerHTML = `<i class="fa fa-user text-primary me-2"></i>${data.username || data.email}`;
    userSpan.classList.add("text-dark");

    const logoutBtn = createButton("Logout", "btn btn-sm btn-danger");
    logoutBtn.addEventListener("click", async () => {
      try {
        const resLogout = await fetch("{% url 'account:api/v1:logout' %}", {
          method: "POST",
          credentials: "include"
        });
        if (resLogout.ok) window.location.reload();
        else alert("Logout failed");
      } catch (err) {
        console.error("Logout error:", err);
      }
    });

    authHeader.appendChild(userSpan);
    authHeader.appendChild(logoutBtn);

    // Fill Profile Left & Right
    document.getElementById("profileName").innerText = data.username || data.full_name;
    document.getElementById("fullName").innerText = data.full_name || data.username;
    document.getElementById("email").innerText = data.user?.email || data.email;
    document.getElementById("phone").innerText = data.phone || "-";
    document.getElementById("address").innerText = data.address || "-";
    document.getElementById("profileWebsite").innerText = data.website || "https://bootdey.com";
    document.getElementById("profileGithub").innerText = data.github || "bootdey";
    document.getElementById("profileLocation").innerText = data.location || "Bay Area, San Francisco, CA";

  } catch(err) {
    console.log("User not logged in:", err);
    const loginBtn = createButton("Sign in", "btn btn-sm btn-light me-2", "{% url 'account:login' %}");

  }
});
</script>
