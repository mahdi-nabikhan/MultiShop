       <!-- User Comments & Addresses -->

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<!-- Feather Icons Init -->
<script> feather.replace(); </script>

<!-- Fetch User Profile -->
<script>
document.addEventListener("DOMContentLoaded", async () => {
  const authHeader = document.getElementById("authHeader");
  const createButton = (text, classes, href="#") => {
    const btn = document.createElement("a");
    btn.innerText = text;
    btn.className = classes;
    btn.href = href;
    return btn;
  };

  try {
    const res = await fetch("/customer/api/v1/customer/detail", { credentials: "include" });
    if (!res.ok) throw new Error("Not authenticated");
    const data = await res.json();

    // Header
    const userSpan = document.createElement("span");
    userSpan.innerHTML = `<i class="fa fa-user text-primary me-2"></i>${data.username || data.user.email}`;
    userSpan.classList.add("text-dark");
    const logoutBtn = createButton("Logout", "btn btn-sm btn-danger");
    logoutBtn.addEventListener("click", async () => {
      const resLogout = await fetch("{% url 'account:api/v1:logout' %}", {
        method: "POST",
        credentials: "include"
      });
      if (resLogout.ok) window.location.reload();
      else alert("Logout failed");
    });
    authHeader.appendChild(userSpan);
    authHeader.appendChild(logoutBtn);

    // Fill profile
    document.getElementById("profileName").innerText = data.username || data.user.email;
    document.getElementById("fullName").innerText = data.username || data.user.email;
    document.getElementById("email").innerText = data.user.email;
    document.getElementById("phone").innerText = data.phone || "-";
    document.getElementById("address").innerText = data.address || "-";
    document.getElementById("profileWebsite").innerText = data.website || "-";
    document.getElementById("profileGithub").innerText = data.github || "-";
    document.getElementById("profileLocation").innerText = data.location || "-";

  } catch(err) {
    console.log("User not logged in:", err);
   
    authHeader.appendChild(loginBtn);
  }
});
</script>

<!-- Fetch Orders -->
<script>
async function loadOrders() {
  const container = document.getElementById("orderlist");
  container.innerHTML = "<p class='text-muted'>Loading orders...</p>";

  try {
    const res = await fetch("/order/api/v1/orders/", { credentials: "include" });
    if (!res.ok) throw new Error("Failed to load orders");

    const orders = await res.json();
    if (!orders.length) {
      container.innerHTML = "<p class='text-muted'>No orders yet.</p>";
      return;
    }

    container.innerHTML = "";
    orders.forEach(o => {
      const div = document.createElement("div");
      div.classList.add("mb-2", "p-2", "border", "rounded");
      div.innerHTML = `<strong>Order #${o.id}</strong><br>
                       <small class="text-secondary">Status: ${o.status ? "Completed" : "Pending"} | Created: ${o.created}</small>
                       <a href ='/website/shop/list/'> detail </a>`;
      container.appendChild(div);
    });

  } catch(err) {
    console.error(err);
    container.innerHTML = "<p class='text-danger'>Failed to load orders</p>";
  }
}
document.addEventListener("DOMContentLoaded", loadOrders);
</script>

<!-- Fetch User Comments -->
<script>
async function loadUserComments() {
  const container = document.getElementById("userComments");
  container.innerHTML = "<p class='text-muted'>Loading comments...</p>";

  try {
    const res = await fetch("/customer/api/v1/all/comments/", { credentials: "include" });
    if (!res.ok) throw new Error("Failed to load comments");

    const comments = await res.json();
    if (!comments || comments.length === 0) {
      container.innerHTML = "<p class='text-muted'>No comments yet.</p>";
      return;
    }

    container.innerHTML = "";
    comments.forEach(c => {
      const div = document.createElement("div");
      div.classList.add("mb-3", "p-2", "border", "rounded");
      div.innerHTML = `<strong>${c.user.email}</strong> 
                       <span class="text-secondary small">[${c.status}]</span>
                       <p>${c.descriptions} </p> <a href='/website/shop/list/'>detail</a>`;
      container.appendChild(div);
    });

  } catch(err) {
    console.error(err);
    container.innerHTML = "<p class='text-danger'>Failed to load comments</p>";
  }
}
document.addEventListener("DOMContentLoaded", loadUserComments);
</script>
<!-- Fetch User Addresses -->
<script>
  async function loadUserAddresses() {
    const container = document.getElementById("userAddresses");
    container.innerHTML = "<p class='text-muted'>Loading addresses...</p>";
  
    try {
      const res = await fetch("/customer/api/v1/add/address/", { credentials: "include" });
      if (!res.ok) throw new Error("Failed to load addresses");
  
      const addresses = await res.json();
      if (!addresses || addresses.length === 0) {
        container.innerHTML = "<p class='text-muted'>No addresses yet.</p>";
        return;
      }
  
      container.innerHTML = "";
      addresses.forEach(a => {
        const div = document.createElement("div");
        div.classList.add("mb-3", "p-2", "border", "rounded");
        div.innerHTML = `<p><strong>State:</strong> ${a.state}</p>
                         <p><strong>City:</strong> ${a.city}</p>
                         <p><strong>Postal Code:</strong> ${a.postal_code}</p>  <a href="/customer/detail/address/" class="address-detail-link" data-id="${a.pk}">Detail</a>`;
        console.log(a.pk)
                         container.appendChild(div);

      });
  
    } catch(err) {
      console.error(err);
      container.innerHTML = "<p class='text-danger'>Failed to load addresses</p>";
    }
  }
  document.addEventListener("DOMContentLoaded", loadUserAddresses);
  document.addEventListener("click", e => {
    if (e.target.classList.contains("address-detail-link")) {
      e.preventDefault();
      const addressId = e.target.getAttribute("data-id");
      localStorage.setItem("selectedAddressId", addressId);
      window.location.href = "/customer/detail/address/";
    }
  });
  
  </script>
  <script>
    async function loadAddresses() {
      const container = document.getElementById("userAddresses");
      container.innerHTML = "<p class='text-muted'>Loading...</p>";
  
      try {
        const res = await fetch("/customer/api/v1/add/address/", {
          credentials: "include" // 🔑 برای کوکی و احراز هویت
        });
        if (!res.ok) throw new Error("Failed to load addresses");
  
        const data = await res.json();
  
        container.innerHTML = "";
        data.forEach(addr => {
          // 👇 اگر id نبود از pk یا address_id استفاده کن
          const id = addr.id || addr.pk || addr.address_id;
          console.log("Loaded address:", addr, " | id:", id);
  
          const div = document.createElement("div");
          div.className = "card mb-3 p-3";
          div.innerHTML = `
            <h6>${addr.state}, ${addr.city}</h6>
            <p>${addr.address}</p>
            <p><strong>Postal Code:</strong> ${addr.postal_code}</p>
            <button class="btn btn-outline-primary btn-sm" onclick="showAddressDetail(${id})">Details</button>
          `;
          container.appendChild(div);
        });
      } catch (err) {
        console.error(err);
        container.innerHTML = "<p class='text-danger'>Failed to load addresses</p>";
      }
    }
  
    function showAddressDetail(id) {
      if (!id) {
        alert("Address ID not found!");
        return;
      }
      localStorage.setItem("selectedAddressId", id);
      // مسیر درست
      const url = "/customer/detail/address/"
      console.log("Redirecting to:", url);
  
      window.location.href = url;
    }
  
    document.addEventListener("DOMContentLoaded", loadAddresses);
  </script>
  
</body>
</html>
