{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Order Items Details</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">
  <div class="card shadow-sm p-4">
    <h3 class="mb-3">Order Items</h3>
    <p><strong>Order Status:</strong> <span id="orderStatus" class="text-primary"></span></p>
    <div id="orderItems">Loading...</div>
    <hr>
    <h5 class="text-end mt-3">Total: $<span id="orderTotal">0</span></h5>
  </div>
</div>

<script>
async function loadOrderItems() {
  const orderId = localStorage.getItem("selectedOrderId");
  const orderItemsDiv = document.getElementById("orderItems");
  const statusElement = document.getElementById("orderStatus");
  const totalElement = document.getElementById("orderTotal");

  if (!orderId) {
    orderItemsDiv.innerHTML = "<p class='text-danger'>No order selected.</p>";
    return;
  }

  try {
    const res = await fetch(`/order/api/v1/order/item/list/${orderId}/`, { credentials: "include" });
    if (!res.ok) throw new Error("Failed to load items.");
    const items = await res.json();

    if (items.length === 0) {
      orderItemsDiv.innerHTML = "<p class='text-muted'>No items in this order.</p>";
      return;
    }

    let total = 0;
    let orderStatus = items[0].order_status || items[0].status;
    statusElement.textContent = orderStatus === "P" ? "Pending" : "Confirmed";

    orderItemsDiv.innerHTML = "";

    items.forEach(item => {
      const div = document.createElement("div");
      div.classList.add("border", "rounded", "p-3", "mb-3", "bg-white", "shadow-sm");

      // اگر total نال باشد، خودمان محاسبه کنیم
      const itemTotal = item.total !== null ? parseFloat(item.total) : parseFloat(item.product.price) * parseInt(item.quantity);
      total += itemTotal;

      let buttonsHTML = "";
      if (item.status === "P") {
        buttonsHTML = `
          <div class="mt-3 d-flex gap-2" id="buttons-${item.id}">
            <button class="btn btn-warning btn-sm" onclick="showUpdateForm(${item.id}, ${item.quantity})">Update</button>
            <button class="btn btn-danger btn-sm" onclick="deleteItem(${item.id})">Delete</button>
          </div>
          <form class="mt-2 d-none" id="form-${item.id}" onsubmit="submitUpdate(event, ${item.id})">
            <div class="input-group">
              <input type="number" min="1" class="form-control" id="input-${item.id}" value="${item.quantity}" required>
              <button type="submit" class="btn btn-success">Save</button>
              <button type="button" class="btn btn-secondary" onclick="cancelUpdate(${item.id})">Cancel</button>
            </div>
          </form>
        `;
      }

      div.innerHTML = `
        <div class="d-flex justify-content-between align-items-center">
          <div>
            <h6>${item.product.name}</h6>
            <p class="mb-1 text-muted">Quantity: <span id="quantity-${item.id}">${item.quantity}</span></p>
            <p class="mb-1 text-muted">Price: $${item.product.price}</p>
            <small class="text-success">Total: $${itemTotal.toFixed(2)}</small>
          </div>
          ${buttonsHTML}
        </div>
      `;
      orderItemsDiv.appendChild(div);
    });

    totalElement.textContent = total.toFixed(2);

  } catch (err) {
    console.error(err);
    orderItemsDiv.innerHTML = "<p class='text-danger'>Error loading order items.</p>";
  }
}

// نمایش فرم آپدیت
function showUpdateForm(itemId, currentQuantity) {
  document.getElementById(`form-${itemId}`).classList.remove("d-none");
  document.getElementById(`buttons-${itemId}`).classList.add("d-none");
}

// لغو فرم آپدیت
function cancelUpdate(itemId) {
  document.getElementById(`form-${itemId}`).classList.add("d-none");
  document.getElementById(`buttons-${itemId}`).classList.remove("d-none");
}

// ارسال فرم بروزرسانی
async function submitUpdate(e, itemId) {
  e.preventDefault();
  const newQuantity = parseInt(document.getElementById(`input-${itemId}`).value);
  if (!newQuantity || newQuantity < 1) return alert("Invalid quantity");

  const res = await fetch(`/order/api/v1/order/item/detail/${itemId}/`, {
    method: "PATCH",
    headers: { "Content-Type": "application/json" },
    credentials: "include",
    body: JSON.stringify({ quantity: newQuantity })
  });

  if (res.ok) {
    alert("Item updated successfully.");
    loadOrderItems();
  } else {
    alert("Failed to update item.");
  }
}

// حذف آیتم با تایید کاربر
async function deleteItem(itemId) {
  if (!confirm("Are you sure you want to delete this item?")) return;

  const res = await fetch(`/order/api/v1/order/item/detail/${itemId}/`, {
    method: "DELETE",
    credentials: "include"
  });

  if (res.ok) {
    alert("Item deleted successfully.");
    loadOrderItems();
  } else {
    alert("Failed to delete item.");
  }
}

document.addEventListener("DOMContentLoaded", loadOrderItems);
</script>

</body>
</html>
