{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Address Detail</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    .loader {
      border: 4px solid #f3f3f3;
      border-top: 4px solid #3498db;
      border-radius: 50%;
      width: 30px;
      height: 30px;
      animation: spin 1s linear infinite;
      display: inline-block;
      margin-left: 10px;
    }
    @keyframes spin { 100% { transform: rotate(360deg); } }
    #messageBox { margin-top: 15px; }
  </style>
</head>
<body class="bg-light">

<div class="container mt-5">
  <div class="card p-4 shadow-sm">
    <h4 class="mb-3">Address Details</h4>
    <div id="addressDetail" class="text-muted">
      <span class="loader"></span> Loading...
    </div>

    <div class="mt-4">
      <button id="deleteAddress" class="btn btn-danger me-2">Delete</button>
      <button id="updateAddress" class="btn btn-warning">Edit</button>
    </div>

    <!-- Update Form -->
    <form id="updateForm" class="mt-4 d-none">
      <div class="mb-3">
        <label class="form-label">State</label>
        <input type="text" class="form-control" id="stateInput" required>
      </div>
      <div class="mb-3">
        <label class="form-label">City</label>
        <input type="text" class="form-control" id="cityInput" required>
      </div>
      <div class="mb-3">
        <label class="form-label">Postal Code</label>
        <input type="text" class="form-control" id="postalInput" required>
      </div>
      <button type="submit" class="btn btn-success me-2">Save</button>
      <button type="button" class="btn btn-secondary" id="cancelUpdate">Cancel</button>
    </form>

    <div id="messageBox"></div>
  </div>
</div>

<script>
function showMessage(text, type="success") {
  const box = document.getElementById("messageBox");
  box.innerHTML = `<div class="alert alert-${type}" role="alert">${text}</div>`;
  setTimeout(() => { box.innerHTML = ""; }, 3000);
}

async function loadAddressDetail() {
  const id = localStorage.getItem("selectedAddressId");
  const detailDiv = document.getElementById("addressDetail");

  if (!id) {
    detailDiv.innerText = "No address selected.";
    return;
  }

  detailDiv.innerHTML = '<span class="loader"></span> Loading...';

  try {
    const res = await fetch(`/customer/api/v1/detail/address/${id}/`, { credentials: "include" });
    if (!res.ok) throw new Error("Failed to load address.");
    const data = await res.json();

    detailDiv.innerHTML = `
      <p><strong>State:</strong> ${data.state}</p>
      <p><strong>City:</strong> ${data.city}</p>
      <p><strong>Postal Code:</strong> ${data.postal_code}</p>
    `;

    document.getElementById("stateInput").value = data.state;
    document.getElementById("cityInput").value = data.city;
    document.getElementById("postalInput").value = data.postal_code;

  } catch (err) {
    detailDiv.innerHTML = "<p class='text-danger'>Error loading address.</p>";
  }
}

document.addEventListener("DOMContentLoaded", loadAddressDetail);

// Delete
document.getElementById("deleteAddress").addEventListener("click", async () => {
  if (!confirm("Are you sure you want to delete this address?")) return;
  const id = localStorage.getItem("selectedAddressId");
  const btn = document.getElementById("deleteAddress");
  btn.disabled = true;

  try {
    const res = await fetch(`/customer/api/v1/detail/address/${id}/`, {
      method: "DELETE",
      credentials: "include",
    });
    if (res.ok) {
      showMessage("Address deleted successfully.", "success");
      localStorage.removeItem("selectedAddressId");
      setTimeout(() => { window.location.href = "/customer/profile/"; }, 1000);
    } else {
      showMessage("Failed to delete address.", "danger");
    }
  } finally {
    btn.disabled = false;
  }
});

// Show/Hide Update Form
document.getElementById("updateAddress").addEventListener("click", () => {
  document.getElementById("updateForm").classList.toggle("d-none");
});

// Cancel Update
document.getElementById("cancelUpdate").addEventListener("click", () => {
  document.getElementById("updateForm").classList.add("d-none");
});

// Submit Update
document.getElementById("updateForm").addEventListener("submit", async (e) => {
  e.preventDefault();
  const id = localStorage.getItem("selectedAddressId");
  const saveBtn = e.target.querySelector("button[type='submit']");
  saveBtn.disabled = true;

  const body = {
    state: document.getElementById("stateInput").value,
    city: document.getElementById("cityInput").value,
    postal_code: document.getElementById("postalInput").value
  };

  try {
    const res = await fetch(`/customer/api/v1/detail/address/${id}/`, {
      method: "PUT",
      headers: { "Content-Type": "application/json" },
      credentials: "include",
      body: JSON.stringify(body),
    });
    if (res.ok) {
      showMessage("Address updated successfully!", "success");
      document.getElementById("updateForm").classList.add("d-none");
      loadAddressDetail();
    } else {
      showMessage("Failed to update address.", "danger");
    }
  } catch (err) {
    showMessage("Error updating address.", "danger");
  } finally {
    saveBtn.disabled = false;
  }
});
</script>

</body>
</html>
