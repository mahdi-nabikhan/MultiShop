{% extends 'base/base.html' %}
{% load static %}
{% block content %}
<!-- Orders Start -->
<div class="container-fluid">
    <div class="row px-xl-5">
        <div class="col-lg-8 table-responsive mb-5">
            <table class="table table-light table-borderless table-hover text-center mb-0">
                <thead class="thead-dark">
                    <tr>
                        <th>Image</th>
                        <th>Title</th>
                        <th>Price</th>
                        <th>Quantity</th>
                        <th>Total</th>
                        <th>Remove</th>
                    </tr>
                </thead>
                <tbody class="align-middle" id="order-items-body">
                    <tr>
                        <td colspan="6">Loading...</td>
                    </tr>
                </tbody>
            </table>
        </div>
        <div class="col-lg-4">
            <form class="mb-30" action="">
                <div class="input-group">
                    <input type="text" class="form-control border-0 p-4" placeholder="Coupon Code">
                    <div class="input-group-append">
                        <button class="btn btn-primary">Apply Coupon</button>
                    </div>
                </div>
            </form>
            <h5 class="section-title position-relative text-uppercase mb-3"><span class="bg-secondary pr-3">Cart Summary</span></h5>
            <div class="bg-light p-30 mb-5">
                <div class="border-bottom pb-2">
                    <div class="d-flex justify-content-between mb-3">
                        <h6>Subtotal</h6>
                        <h6 id="subtotal">$0</h6>
                    </div>
                    <div class="d-flex justify-content-between">
                        <h6 class="font-weight-medium">Shipping</h6>
                        <h6 class="font-weight-medium">$10</h6>
                    </div>
                </div>
                <div class="pt-2">
                    <div class="d-flex justify-content-between mt-2">
                        <h5>Total</h5>
                        <h5 id="total">$0</h5>
                    </div>
                    <button class="btn btn-block btn-primary font-weight-bold my-3 py-3">Proceed To Checkout</button>
                </div>
            </div>
        </div>
    </div>
</div>
<!-- Orders End -->

<script>
document.addEventListener("DOMContentLoaded", () => {
    const tbody = document.getElementById("order-items-body");
    const subtotalEl = document.getElementById("subtotal");
    const totalEl = document.getElementById("total");

    // بررسی لاگین بودن کاربر قبل از فراخوانی OrderItems
    fetch("{% url 'account:api/v1:profile' %}", {
        method: "GET",
        credentials: "include"
    })
    .then(res => {
        if(!res.ok) throw new Error("Not authenticated");
        return res.json();
    })
    .then(userData => {
        // ✅ کاربر لاگین است، حالا OrderItems را از API بگیریم
        fetch("/order/api/v1/order/item/", {
            method: "GET",
            credentials: "include"
        })
        .then(res => res.json())
        .then(data => {
            tbody.innerHTML = "";
            let subtotal = 0;

            if(data.length === 0){
                tbody.innerHTML = `<tr><td colspan="6">No orders found.</td></tr>`;
                subtotalEl.textContent = "$0";
                totalEl.textContent = "$0";
                return;
            }

            data.forEach(item => {
                const total_price = item.product.price * item.quantity;
                subtotal += total_price;

                const tr = document.createElement("tr");
                tr.innerHTML = `
                    <td class="align-middle"><img src="${item.product.product_image}" alt="" style="width: 50px;"></td>
                    <td class="align-middle">${item.product.name}</td>
                    <td class="align-middle">$${item.product.price}</td>
                    <td class="align-middle">${item.quantity}</td>
                    <td class="align-middle">$${total_price}</td>
                    <td class="align-middle">
                        <button class="btn btn-sm btn-danger remove-btn" data-id="${item.id}">X</button>
                    </td>
                `;
                tbody.appendChild(tr);
            });

            subtotalEl.textContent = `$${subtotal}`;
            totalEl.textContent = `$${subtotal + 10}`; // Shipping ثابت 10 دلار

            // حذف آیتم‌ها
            document.querySelectorAll(".remove-btn").forEach(btn => {
                btn.addEventListener("click", async () => {
                    const id = btn.dataset.id;
                    try {
                        const res = await fetch(`/order/api/v1/order/item/${id}/`, {
                            method: "DELETE",
                            credentials: "include"
                        });
                        if(res.ok){
                            btn.closest("tr").remove();
                            alert("Item removed successfully");
                            // دوباره محاسبه subtotal
                            let newSubtotal = 0;
                            document.querySelectorAll("#order-items-body tr").forEach(row => {
                                const price = parseFloat(row.children[2].textContent.replace("$",""));
                                const qty = parseInt(row.children[3].textContent);
                                newSubtotal += price * qty;
                            });
                            subtotalEl.textContent = `$${newSubtotal}`;
                            totalEl.textContent = `$${newSubtotal + 10}`;
                        }
                    } catch(err){
                        console.error(err);
                        alert("Failed to remove item");
                    }
                });
            });

        })
        .catch(err => {
            console.error(err);
            tbody.innerHTML = `<tr><td colspan="6">Failed to load orders.</td></tr>`;
        });
    })
    .catch(err => {
        console.error(err);
        tbody.innerHTML = `<tr><td colspan="6">You must login to view your orders.</td></tr>`;
        subtotalEl.textContent = "$0";
        totalEl.textContent = "$0";
    });
});
</script>
{% endblock content %}
