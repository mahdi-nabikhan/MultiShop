{% extends "base/admin_panel_base.html" %}

{% block content %}
<h3>📦 Product Details</h3>

<div id="productDetail" class="mt-3">
    <p>Loading...</p>
</div>

<!-- دکمه و فرم آپدیت محصول -->
<button class="btn btn-warning mt-3" type="button" data-bs-toggle="collapse" data-bs-target="#updateFormContainer" aria-expanded="false" aria-controls="updateFormContainer">
    📝 Update Product
</button>

<div class="collapse mt-3" id="updateFormContainer">
    <div class="card card-body">
        <form id="updateProductForm" enctype="multipart/form-data">
            <div class="mb-3">
                <label for="name" class="form-label">Name</label>
                <input type="text" id="name" class="form-control">
            </div>
            <div class="mb-3">
                <label for="description" class="form-label">Description</label>
                <textarea id="description" class="form-control"></textarea>
            </div>
            <div class="mb-3">
                <label for="quantity_in_stock" class="form-label">Stock</label>
                <input type="number" id="quantity_in_stock" class="form-control">
            </div>
            <div class="mb-3">
                <label for="price" class="form-label">Price</label>
                <input type="number" id="price" class="form-control">
            </div>
            <div class="mb-3">
                <label for="price_after" class="form-label">Price After Discount</label>
                <input type="number" id="price_after" class="form-control">
            </div>
            <div class="mb-3">
                <label for="image" class="form-label">Product Image</label>
                <input type="file" id="image" class="form-control">
            </div>
            <button type="submit" class="btn btn-success">Update Product</button>
        </form>
    </div>
</div>

<!-- دکمه و فرم اضافه کردن تخفیف -->
<button class="btn btn-info mt-3" type="button" data-bs-toggle="collapse" data-bs-target="#discountFormContainer" aria-expanded="false" aria-controls="discountFormContainer">
    💰 Add Discount
</button>

<div class="collapse mt-3" id="discountFormContainer">
    <div class="card card-body">
        <form id="addDiscountForm">
            <div class="mb-3">
                <label for="discount_type" class="form-label">Discount Type</label>
                <select id="discount_type" class="form-select">
                    <option value="cash">Cash</option>
                    <option value="percentage">Percentage</option>
                </select>
            </div>
            <div class="mb-3">
                <label for="discount_value" class="form-label">Value</label>
                <input type="number" id="discount_value" class="form-control">
            </div>
            <button type="submit" class="btn btn-primary">Add Discount</button>
        </form>
    </div>
</div>

<a href="{% url 'vendors:panel' %}" class="btn btn-secondary mt-3">Back to Products</a>

<script>
document.addEventListener("DOMContentLoaded", async () => {
    const params = new URLSearchParams(window.location.search);
    const productId = params.get("id");
    const detailContainer = document.getElementById("productDetail");
    const updateForm = document.getElementById("updateProductForm");
    const discountForm = document.getElementById("addDiscountForm");

    if (!productId) {
        detailContainer.innerHTML = "<p class='text-danger'>Product ID not provided.</p>";
        return;
    }

    async function loadProductDetails() {
        try {
            const response = await fetch(`/vendor/api/v1/detail/product/${productId}/`, {
                method: "GET",
                credentials: "include",
                headers: { "Content-Type": "application/json" }
            });
            if (!response.ok) throw new Error("Failed to load product details.");
            const product = await response.json();

            detailContainer.innerHTML = `
                <table class="table table-bordered">
                    <tr><th>Image</th><td>${product.product_image ? `<img src="${product.product_image}" alt="${product.name}" style="max-width:150px;">` : "No Image"}</td></tr>
                    <tr><th>Name</th><td>${product.name}</td></tr>
                    <tr><th>Description</th><td>${product.description}</td></tr>
                    <tr><th>Stock</th><td>${product.quantity_in_stock}</td></tr>
                    <tr><th>Price</th><td>${product.price}</td></tr>
                    <tr><th>Price After Discount</th><td>${product.price_after || "-"}</td></tr>
                </table>
            `;

            // پر کردن فرم آپدیت
            updateForm.name.value = product.name;
            updateForm.description.value = product.description;
            updateForm.quantity_in_stock.value = product.quantity_in_stock;
            updateForm.price.value = product.price;
            updateForm.price_after.value = product.price_after || "";

        } catch (err) {
            console.error(err);
            detailContainer.innerHTML = `<p class="text-danger">${err.message}</p>`;
        }
    }

    // آپدیت محصول
    updateForm.addEventListener("submit", async (e) => {
        e.preventDefault();
        const formData = new FormData();
        formData.append("name", updateForm.name.value);
        formData.append("description", updateForm.description.value);
        formData.append("quantity_in_stock", updateForm.quantity_in_stock.value);
        formData.append("price", updateForm.price.value);
        formData.append("price_after", updateForm.price_after.value || "");
        if (updateForm.image.files.length > 0) {
            formData.append("image", updateForm.image.files[0]);
        }

        try {
            const res = await fetch(`/vendor/api/v1/detail/product/${productId}/`, {
                method: "PATCH",
                credentials: "include",
                body: formData
            });
            if (!res.ok) throw new Error("Failed to update product.");
            alert("Product updated successfully!");
            await loadProductDetails();
        } catch (err) {
            console.error(err);
            alert(err.message);
        }
    });

    // اضافه کردن تخفیف
    discountForm.addEventListener("submit", async (e) => {
        e.preventDefault();
        const discountData = {
            discount_type: discountForm.discount_type.value,
            value: discountForm.discount_value.value
        };

        try {
            const res = await fetch(`/vendor/api/v1/add/product/discount/${productId}/`, {
                method: "POST",
                credentials: "include",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(discountData)
            });

            if (!res.ok) throw new Error("Failed to add discount.");
            alert("Discount added successfully!");
        } catch (err) {
            console.error(err);
            alert(err.message);
        }
    });

    await loadProductDetails();
});
</script>
{% endblock %}
