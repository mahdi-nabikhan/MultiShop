{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Comment Detail</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">
  <div class="card p-4 shadow-sm">
    <h4 class="mb-3">Comment Details</h4>
    <div id="commentDetail" class="text-muted">Loading...</div>

    <div class="mt-4">
      <button id="deleteComment" class="btn btn-danger me-2">Delete</button>
      <button id="updateComment" class="btn btn-warning">Update</button>
    </div>

    <!-- Update Form -->
    <form id="updateForm" class="mt-4 d-none">
      <div class="mb-3">
        <label class="form-label">Status</label>
        <input type="text" class="form-control" id="statusInput">
      </div>
      <div class="mb-3">
        <label class="form-label">Description</label>
        <textarea class="form-control" id="descriptionInput" rows="4"></textarea>
      </div>
      <button type="submit" class="btn btn-success">Save</button>
    </form>
  </div>
</div>

<script>
async function loadCommentDetail() {
  const id = localStorage.getItem("selectedCommentId");
  if (!id) {
    document.getElementById("commentDetail").innerText = "No comment selected.";
    return;
  }

  try {
    const res = await fetch(`/customer/api/v1/detail/comment/${id}/`, { credentials: "include" });
    if (!res.ok) throw new Error("Failed to load comment.");
    const data = await res.json();

    document.getElementById("commentDetail").innerHTML = `
      <p><strong>User:</strong> ${data.user.email}</p>
      <p><strong>Status:</strong> ${data.status}</p>
      <p><strong>Description:</strong> ${data.descriptions}</p>
    `;

    document.getElementById("statusInput").value = data.status;
    document.getElementById("descriptionInput").value = data.descriptions;

  } catch (err) {
    document.getElementById("commentDetail").innerHTML =
      "<p class='text-danger'>Error loading comment.</p>";
  }
}

document.addEventListener("DOMContentLoaded", loadCommentDetail);

// حذف کامنت
document.getElementById("deleteComment").addEventListener("click", async () => {
  const id = localStorage.getItem("selectedCommentId");
  if (!id) return alert("Comment ID not found!");
  if (!confirm("Are you sure you want to delete this comment?")) return;

  const res = await fetch(`/customer/api/v1/detail/comment/${id}/`, {
    method: "DELETE",
    credentials: "include",
  });

  if (res.ok) {
    alert("Comment deleted.");
    localStorage.removeItem("selectedCommentId");
    window.location.href = "/customer/profile/";
  } else {
    alert("Failed to delete comment.");
  }
});

// نمایش فرم بروزرسانی
document.getElementById("updateComment").addEventListener("click", () => {
  document.getElementById("updateForm").classList.toggle("d-none");
});

// ارسال بروزرسانی کامنت
document.getElementById("updateForm").addEventListener("submit", async (e) => {
  e.preventDefault();
  const id = localStorage.getItem("selectedCommentId");
  const body = {
    status: document.getElementById("statusInput").value,
    descriptions: document.getElementById("descriptionInput").value
  };

  try {
    const res = await fetch(`/customer/api/v1/detail/comment/${id}/`, {
      method: "PUT",
      headers: { "Content-Type": "application/json" },
      credentials: "include",
      body: JSON.stringify(body)
    });

    if (res.ok) {
      alert("Comment updated!");
      loadCommentDetail();
    } else {
      const errData = await res.json();
      console.error(errData);
      alert("Update failed: " + JSON.stringify(errData));
    }
  } catch(err) {
    console.error(err);
    alert("Update failed due to network error.");
  }
});
</script>

</body>
</html>
