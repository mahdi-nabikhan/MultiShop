{% extends 'base/base.html' %}
{% block content%}
    
    

    <style>
        body {
            background: #f0f2f5;
            font-family: "IRANSans", Arial, sans-serif;
        }
        .form-container {
            max-width: 600px;
            margin: 50px auto;
            padding: 30px;
            border-radius: 15px;
            background: #fff;
            box-shadow: 0px 6px 20px rgba(0,0,0,0.1);
        }
        .form-control {
            font-size: 18px;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
        }
        .btn-primary {
            width: 100%;
            padding: 15px;
            font-size: 18px;
            border-radius: 10px;
        }
        #result {
            margin-top: 15px;
            font-size: 16px;
            text-align: center;
        }
    </style>


    <form id="registerForm" method="POST">
        <input class="form-control" type="email" name="email" placeholder="ایمیل" required>
        <input class="form-control" type="password" name="password" placeholder="رمز عبور" required>
        <input class="form-control" type="password" name="password2" placeholder="تکرار رمز عبور" required>
        <input class="form-control" type="text" name="username" placeholder="نام کاربری" required>
        <button type="submit" class="btn btn-primary">ثبت‌نام</button>
    </form>
    <div id="result"></div>
    
    <script>
    document.getElementById("registerForm").addEventListener("submit", async function(e) {
        e.preventDefault();
    
        const formData = {
            username: this.username.value,
            user: {
                email: this.email.value,
                password: this.password.value,
                password2: this.password2.value
            }
        };
    
        try {
            const response = await fetch('/customer/api/v1/customer/register/', {
                method: "POST",
                headers: {
                    "Content-Type": "application/json",
                    "X-CSRFToken": getCookie("csrftoken")
                },
                body: JSON.stringify(formData)
            });
    
            const data = await response.json();
    
            if (response.ok) {
                document.getElementById("result").innerHTML =
                    `<p class="text-success">ثبت‌نام موفق بود 🎉</p>`;
                setTimeout(() => {
                    window.location.href = "{% url 'shop-list' %}";
                }, 3000);
            } else {
                document.getElementById("result").innerHTML =
                    `<p class="text-danger">خطا: ${JSON.stringify(data)}</p>`;
            }
    
        } catch (err) {
            document.getElementById("result").innerHTML =
                `<p class="text-danger">⚠️ مشکلی پیش اومد</p>`;
        }
    });
    
    function getCookie(name) {
        let cookieValue = null;
        if (document.cookie && document.cookie !== "") {
            const cookies = document.cookie.split(";");
            for (let cookie of cookies) {
                cookie = cookie.trim();
                if (cookie.startsWith(name + "=")) {
                    cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                    break;
                }
            }
        }
        return cookieValue;
    }
    </script>
    
{% endblock content %}
