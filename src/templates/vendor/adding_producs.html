{% extends "base/admin_panel_base.html" %}
{% block content %}
<h3>➕ Add New Product</h3>

<form id="productForm" class="mt-4">
  <div class="mb-3">
    <label class="form-label">Name</label>
    <input type="text" id="name" class="form-control" required>
  </div>

  <div class="mb-3">
    <label class="form-label">Description</label>
    <textarea id="description" class="form-control" required></textarea>
  </div>

  <div class="mb-3">
    <label class="form-label">Quantity in Stock</label>
    <input type="number" id="quantity_in_stock" class="form-control" required>
  </div>

  <div class="mb-3">
    <label class="form-label">Price</label>
    <input type="number" id="price" class="form-control" required>
  </div>

  <div class="mb-3">
    <label class="form-label">Price After Discount (optional)</label>
    <input type="number" id="price_after" class="form-control">
  </div>

  <div class="mb-3">
    <label class="form-label">Category ID</label>
    <input type="number" id="category" class="form-control" required>
  </div>

  <div class="mb-3">
    <label class="form-label">Product Image (optional)</label>
    <input type="file" id="product_image" class="form-control">
  </div>

  <button type="submit" class="btn btn-primary">Save Product</button>
</form>

<div id="message" class="mt-3"></div>

<script>
const token = localStorage.getItem("token");
if (!token) {
    alert("You are not logged in! Redirecting...");
    window.location.href = "{% url 'account:login' %}";
}

document.getElementById("productForm").addEventListener("submit", async (e) => {
  e.preventDefault();

  const formData = new FormData();
  formData.append("name", document.getElementById("name").value);
  formData.append("description", document.getElementById("description").value);
  formData.append("quantity_in_stock", document.getElementById("quantity_in_stock").value);
  formData.append("price", document.getElementById("price").value);
  formData.append("price_after", document.getElementById("price_after").value);
  formData.append("category", document.getElementById("category").value);

  const imageInput = document.getElementById("product_image");
  if (imageInput.files.length > 0) {
    formData.append("product_image", imageInput.files[0]);
  }

  try {
    const response = await fetch("{% url 'vendors:api/v1:add-product' %}", {
      method: "POST",
      headers: {
        "Authorization": `Token ${token}`,
      },
      body: formData
    });

    const data = await response.json();
    const messageDiv = document.getElementById("message");

    if (response.ok) {
      messageDiv.innerHTML = `<div class="alert alert-success">✅ Product "${data.name}" added successfully!</div>`;
      document.getElementById("productForm").reset();
    } else {
      messageDiv.innerHTML = `<div class="alert alert-danger">❌ Error: ${JSON.stringify(data)}</div>`;
    }
  } catch (err) {
    console.error(err);
    document.getElementById("message").innerHTML =
      `<div class="alert alert-danger">Server error. Please try again later.</div>`;
  }
});
</script>
{% endblock %}
