{% extends "base/admin_panel_base.html" %}

{% block content %}
<div class="container mt-4">
    <h3 class="mb-4">🧑‍💼 Register New Admin</h3>

    <form id="adminForm">
        <div class="mb-3">
            <label for="username" class="form-label">Admin Username</label>
            <input type="text" id="username" class="form-control" placeholder="Admin Username" required>
        </div>

        <h5 class="mt-4">User Account Info</h5>
        <div class="mb-3">
            <label for="user_email" class="form-label">Email</label>
            <input type="email" id="user_email" class="form-control" placeholder="Email" required>
        </div>

        <div class="mb-3">
            <label for="user_password" class="form-label">Password</label>
            <input type="password" id="user_password" class="form-control" placeholder="Password" required>
        </div>

        <div class="mb-3">
            <label for="user_password2" class="form-label">Confirm Password</label>
            <input type="password" id="user_password2" class="form-control" placeholder="Confirm Password" required>
        </div>

        <button type="submit" class="btn btn-primary">Register Admin</button>
    </form>

    <div id="message" class="mt-3"></div>
</div>

<script>
document.getElementById("adminForm").addEventListener("submit", async (e) => {
    e.preventDefault();

    const messageDiv = document.getElementById("message");
    messageDiv.innerHTML = "";

    // validate passwords match before sending
    const password = document.getElementById("user_password").value;
    const password2 = document.getElementById("user_password2").value;
    if (password !== password2) {
        messageDiv.innerHTML = `<div class="alert alert-danger">❌ Passwords do not match!</div>`;
        return;
    }

    const data = {
        username: document.getElementById("username").value,
        user: {
            email: document.getElementById("user_email").value,
            password: password,
            password2: password2
        }
    };

    try {
        const response = await fetch("{% url 'vendors:api/v1:admin-register' %}", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(data)
        });

        const resData = await response.json();

        if (response.ok) {
            messageDiv.innerHTML = `<div class="alert alert-success">✅ ${resData.massage}</div>`;
            document.getElementById("adminForm").reset();
        } else {
            // اگر خطاهای فیلدی وجود داشت، آنها را مرتب نمایش بده
            let errorHTML = "";
            for (const field in resData) {
                errorHTML += `<div>${field}: ${resData[field]}</div>`;
            }
            messageDiv.innerHTML = `<div class="alert alert-danger">❌ ${errorHTML}</div>`;
        }
    } catch (err) {
        console.error(err);
        messageDiv.innerHTML =
            `<div class="alert alert-danger">❌ Server error. Please try again later.</div>`;
    }
});
</script>
{% endblock %}
