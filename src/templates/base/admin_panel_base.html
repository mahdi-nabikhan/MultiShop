<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { font-family: "IRANSans", Arial, sans-serif; background: #f8f9fa; }
        .sidebar {
            height: 100vh;
            background: #343a40;
            padding-top: 20px;
        }
        .sidebar a { color: #fff; display: block; padding: 12px 20px; text-decoration: none; }
        .sidebar a:hover { background: #495057; }
        .content { padding: 30px; }
    </style>
</head>
<body>
<div class="container-fluid">
    <div class="row">
        <!-- Sidebar -->
        <nav class="col-md-3 col-lg-2 d-md-block sidebar">
            <h4 class="text-white text-center mb-4">Admin Panel</h4>
            <a href="{%url 'vendors:panel'%}">🏠 Dashboard</a>
            <a href="{%url 'vendors:adding_product'%}">➕ Add Product</a>
            <a href="{%url 'vendors:adding_admin'%}">👥 Register Admin</a>
            <a href="#">👥 Register Operator</a>
            <a href="#">📊 Reports</a>
            <a href='{%url 'order:order-list-shop'%}'>⚙️ Orders</a>

        </nav>

        <!-- Main Content -->
        <main class="col-md-9 col-lg-10 ms-sm-auto content">
            {% block content %}{% endblock %}
        </main>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
